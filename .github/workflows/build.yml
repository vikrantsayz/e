name: 🏫 EduManage Pro — Build & Release

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*.*.*'           # v1.0.0, v3.1.2 — is par Release banta hai
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:       # Manually bhi trigger kar sakte ho

# ─────────────────────────────────────────────
# PERMISSIONS
# ─────────────────────────────────────────────
permissions:
  contents: write          # Releases create karne ke liye
  actions: read

# ─────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────
env:
  APP_NAME: EduManage Pro
  APP_ID: com.vkrnt.edumanage
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.6'

jobs:
# ═══════════════════════════════════════════════════════════
#  JOB 1 ── LINT (Code Quality Check)
# ═══════════════════════════════════════════════════════════
  lint:
    name: 🧹 Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --no-daemon

      - name: 📋 Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7


# ═══════════════════════════════════════════════════════════
#  JOB 2 ── BUILD DEBUG APK
# ═══════════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      apk_path: ${{ steps.find_apk.outputs.apk_path }}
      version_name: ${{ steps.version.outputs.version_name }}

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history chahiye version ke liye

      # ── Version Calculate karo ──────────────────────────
      - name: 🔢 Calculate Version
        id: version
        run: |
          # Agar tag push kiya to usse version lo
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Warna commit count + short SHA se banao
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="3.0.${COMMIT_COUNT}-${SHORT_SHA}-debug"
          fi
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ── Gradle Cache ────────────────────────────────────
      - name: ⚡ Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 📦 Check Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️  gradle-wrapper.jar nahi mila, generate kar rahe hain..."
            gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}
          fi

      # ── Debug Build ─────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --parallel \
            --stacktrace

      - name: 🔍 Find APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK mila: $APK"

      # ── Rename APK ──────────────────────────────────────
      - name: ✏️ Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          cp "${{ steps.find_apk.outputs.apk_path }}" \
             "EduManagePro-v${VERSION}-debug.apk"

      - name: 📱 Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduManagePro-debug-${{ steps.version.outputs.version_name }}
          path: EduManagePro-v*-debug.apk
          retention-days: 30

      # ── Build Summary ────────────────────────────────────
      - name: 📊 Debug Build Summary
        run: |
          APK_SIZE=$(du -sh "${{ steps.find_apk.outputs.apk_path }}" | cut -f1)
          echo "## 🟡 Debug Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Version | ${{ steps.version.outputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Artifacts section se Debug APK download karo ↑**" >> $GITHUB_STEP_SUMMARY


# ═══════════════════════════════════════════════════════════
#  JOB 3 ── BUILD RELEASE APK (Signed)
#  ⚠️  Sirf tab chalta hai jab tag push ho YA main/master pe push ho
# ═══════════════════════════════════════════════════════════
  build-release:
    name: 🔐 Build Release APK (Signed)
    runs-on: ubuntu-latest
    needs: lint
    # Sirf main/master branch ya tag pe release build karo
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Calculate Version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="3.0.${COMMIT_COUNT}"
          fi
          # Version Code = commit count
          V_CODE=$(git rev-list --count HEAD)
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$V_CODE" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION (Code: $V_CODE)"

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: ⚡ Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 📦 Check Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}
          fi

      # ── Keystore Decode (Secret se) ──────────────────────
      # ⚠️  Agar KEYSTORE_BASE64 secret set nahi hai to unsigned release banega
      - name: 🔑 Decode Keystore (if available)
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore decoded successfully"
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "⚠️  KEYSTORE_BASE64 secret nahi mila — unsigned release banega"
          fi

      # ── Signed Release Build ─────────────────────────────
      - name: 🏗️ Build Signed Release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HAS_KEYSTORE: ${{ steps.keystore.outputs.has_keystore }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --parallel \
            --stacktrace

      - name: 🔍 Find Release APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ Release APK: $APK"

      - name: ✏️ Rename Release APK
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          cp "${{ steps.find_apk.outputs.apk_path }}" \
             "EduManagePro-v${VERSION}-release.apk"

      - name: 📱 Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduManagePro-release-${{ steps.version.outputs.version_name }}
          path: EduManagePro-v*-release.apk
          retention-days: 90

      - name: 📊 Release Build Summary
        run: |
          APK_SIZE=$(du -sh "${{ steps.find_apk.outputs.apk_path }}" | cut -f1)
          SIGNED="${{ steps.keystore.outputs.has_keystore }}"
          SIGN_STATUS="❌ Unsigned (Keystore secret missing)"
          if [ "$SIGNED" = "true" ]; then SIGN_STATUS="✅ Signed"; fi

          echo "## 🟢 Release Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Version | ${{ steps.version.outputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Version Code | ${{ steps.version.outputs.version_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Signing | $SIGN_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Artifacts section se Release APK download karo ↑**" >> $GITHUB_STEP_SUMMARY


# ═══════════════════════════════════════════════════════════
#  JOB 4 ── GITHUB RELEASE (Sirf v* tags pe)
# ═══════════════════════════════════════════════════════════
  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: ⬇️ Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: EduManagePro-debug-${{ needs.build-debug.outputs.version_name }}
          path: artifacts/

      - name: 📥 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: EduManagePro-release-${{ needs.build-release.outputs.version_name }}
          path: artifacts/

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          # Last 2 tags ke beech ke commits se changelog banao
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURR_TAG="${GITHUB_REF#refs/tags/}"

          echo "## 📋 What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Changes since $PREV_TAG:**" >> changelog.md
            echo "" >> changelog.md
            git log ${PREV_TAG}..${CURR_TAG} \
              --pretty=format:"- %s (%h)" \
              --no-merges >> changelog.md
          else
            echo "- Initial Release 🎉" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "**Full SHA:** \`${{ github.sha }}\`" >> changelog.md

          # Output ke liye
          CHANGELOG=$(cat changelog.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "🏫 EduManage Pro ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
